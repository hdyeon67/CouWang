<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쿠왕 (Couwang)</title>
  <style>
    :root {
      color-scheme: light;
      --brand: #64CAFA;
      --text: #1A1A1A;
      --sub: #555555;
      --line: #DDE8F0;
      --bg: #F5FBFF;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    .brand {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 20px 0 8px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      color: var(--sub);
      margin: 0 0 18px;
    }
    .links {
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    a span {
      display: block;
      margin-top: 4px;
      color: var(--sub);
      font-weight: 400;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <span class="brand">Couwang</span>
    <h1>쿠왕</h1>
    <p>쿠폰이 사라지기 전에, 쿠왕이 먼저 알려드려요.</p>
    <p>쿠왕은 쿠폰, 기프티콘, 멤버십 바코드를 기기 안에서 관리하고 만료 전 로컬 알림을 받을 수 있도록 돕는 앱입니다.</p>

    <section class="links" aria-label="Legal documents">
      <a href="./legal/privacy_policy_ko.html">
        개인정보처리방침
        <span>한국어 개인정보처리방침</span>
      </a>
      <a href="./legal/privacy_policy_en.html">
        Privacy Policy
        <span>English privacy policy</span>
      </a>
    </section>
  </main>
</body>
</html>
