name: couwang_app
description: CouWang Flutter MVP skeleton.
publish_to: "none"

version: 0.1.4+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  barcode_widget: ^2.0.0
  google_mlkit_barcode_scanning: ^0.14.2
  google_mlkit_text_recognition: ^0.15.0
